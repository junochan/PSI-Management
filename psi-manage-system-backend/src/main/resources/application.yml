server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: 15MB

spring:
  application:
    name: smart-ims

  config:
    import: optional:classpath:application-local.yml

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/smart_ims?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.smartims.entity

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  # 生产环境请用环境变量 JWT_SECRET 或 application-local.yml 覆盖，勿使用仓库默认值
  secret: ${JWT_SECRET:dev-only-change-me-via-env-or-application-local-min-32chars!}
  expiration: 7200000
  header: Authorization
  prefix: Bearer

# 以图搜图：DashScope 多模态向量 + 本地 JSON 缓存（相对运行目录）
app:
  # 本地附件根目录；商品图存于 {attachment-dir}/uploads/products/，HTTP 路径 /api/uploads/products/
  attachment-dir: ${APP_ATTACHMENT_DIR:data}
  # 中转页免密登录：POST /v1/auth/sso-login，body { "key": "与 sso-bypass.secret 一致" }，签发 sso-bypass.username 的 JWT
  sso-bypass:
    enabled: ${APP_SSO_BYPASS_ENABLED:false}
    secret: ${APP_SSO_BYPASS_SECRET:}
    username: ${APP_SSO_BYPASS_USERNAME:admin}
  image-search:
    similarity-threshold: ${APP_IMAGE_SEARCH_SIMILARITY_THRESHOLD:0.7}
    embedding-model: ${APP_IMAGE_EMBEDDING_MODEL:tongyi-embedding-vision-flash-2026-03-06}
    embedding-store-dir: ${APP_EMBEDDING_STORE_DIR:data/image-embeddings}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}

logging:
  file:
    name: logs/smart-ims.log
  level:
    com.smartims: debug
    org.springframework.security: info