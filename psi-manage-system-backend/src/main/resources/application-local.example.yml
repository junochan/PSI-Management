# 复制为 application-local.yml（该文件已被 .gitignore 忽略）后填写本地/生产密钥。
# 勿将 application-local.yml 提交到仓库。

spring:
  datasource:
    username: root
    password: your-db-password

jwt:
  # HS256 建议至少 32 字节随机串；生产务必用环境变量或密钥管理
  secret: your-jwt-secret-at-least-32-characters-long

dashscope:
  api-key: your-dashscope-api-key
